<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Phosphor screen -->
    <radialGradient id="screen" cx="26" cy="22" r="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#005200"/>
      <stop offset="55%"  stop-color="#001c00"/>
      <stop offset="100%" stop-color="#000400"/>
    </radialGradient>
    <!-- Sweep sector radial fade -->
    <radialGradient id="sweepGrad" cx="32" cy="32" r="27" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00ff41" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00ff41" stop-opacity="0"/>
    </radialGradient>
    <!-- Metallic bezel -->
    <linearGradient id="bezel" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%"   stop-color="#4a4a4a"/>
      <stop offset="45%"  stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <!-- Blip glow -->
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.0" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Arm glow -->
    <filter id="armGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.55" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Bezel -->
  <circle cx="32" cy="32" r="32"   fill="url(#bezel)"/>
  <circle cx="32" cy="32" r="29.5" fill="#060606"/>

  <!-- Phosphor screen -->
  <circle cx="32" cy="32" r="28.5" fill="url(#screen)"/>

  <!-- Range rings -->
  <circle cx="32" cy="32" r="9.5"  fill="none" stroke="#00ff41" stroke-width="0.4" opacity="0.3"/>
  <circle cx="32" cy="32" r="19"   fill="none" stroke="#00ff41" stroke-width="0.4" opacity="0.3"/>
  <circle cx="32" cy="32" r="28"   fill="none" stroke="#00ff41" stroke-width="0.45" opacity="0.3"/>

  <!-- Crosshairs -->
  <line x1="32" y1="4"  x2="32" y2="60" stroke="#00ff41" stroke-width="0.3" opacity="0.2"/>
  <line x1="4"  y1="32" x2="60" y2="32" stroke="#00ff41" stroke-width="0.3" opacity="0.2"/>

  <!--
    Sweep arm at 45° CW from top  →  tip  (51.09, 12.91)
    Trailing sector 60° wide      →  tail (25.01,  5.92)  at -15°
    Tighter inner glow sector              (38.99,  5.92)  at  15°
  -->
  <path d="M 32,32 L 25.01,5.92 A 27,27 0 0,1 51.09,12.91 Z"
        fill="url(#sweepGrad)"/>
  <path d="M 32,32 L 38.99,5.92 A 27,27 0 0,1 51.09,12.91 Z"
        fill="#00ff41" opacity="0.1"/>

  <!-- Sweep arm -->
  <line x1="32" y1="32" x2="51.09" y2="12.91"
        stroke="#00ff41" stroke-width="1.8" stroke-linecap="round"
        filter="url(#armGlow)"/>

  <!-- Blip 1: ~40°, r=21  →  (45.5, 16.1) -->
  <circle cx="45.5" cy="16"  r="1.8" fill="#00ff41" filter="url(#glow)"/>
  <!-- Blip 2: ~300°, r=16 →  (18.1, 24.0) -->
  <circle cx="18"   cy="24"  r="1.4" fill="#00ff41" filter="url(#glow)" opacity="0.7"/>
  <!-- Blip 3: ~125°, r=15 →  (44.3, 40.6) -->
  <circle cx="44"   cy="41"  r="1.2" fill="#00ff41" filter="url(#glow)" opacity="0.55"/>

  <!-- Center pivot -->
  <circle cx="32" cy="32" r="1.5" fill="#00ff41"/>

  <!-- Subtle glass reflection -->
  <ellipse cx="24" cy="20" rx="7" ry="4.5"
           fill="white" opacity="0.04" transform="rotate(-25,24,20)"/>

  <!-- Rim highlights -->
  <circle cx="32" cy="32" r="32"   fill="none" stroke="#666"    stroke-width="0.4" opacity="0.5"/>
  <circle cx="32" cy="32" r="28.5" fill="none" stroke="#003300" stroke-width="0.4" opacity="0.5"/>
</svg>
